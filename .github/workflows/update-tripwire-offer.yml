name: Update tripwire offer

on:
  push:
    paths:
      - .github/workflows/update-tripwire-offer.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-offer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '<title>Карманный СММщик: мини-система для блога в ChatGPT</title>': '<title>Мини-система для блога с ИИ</title>',
              '<meta name="description" content="Пошаговый практикум: настройте мини-систему для блога в ChatGPT, создайте стратега, хранителя идей, редактора и первый пост.">': '<meta name="description" content="Пошаговый практикум: настройте мини-систему для блога с ИИ, создайте стратега, хранителя идей, редактора и первый пост.">',
              '<strong>Карманный СММщик</strong>': '<strong>Мини-система для блога с ИИ</strong>',
              '<h1>Карманный СММщик: мини-система для блога в ChatGPT</h1>': '<h1>Мини-система для блога с ИИ</h1>',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          old_final = '''          <h3>Чем мини-система отличается от Карманного СММщика</h3>
          <p>Эта мини-система помогает понять механику и уже навести порядок. Но она всё ещё ручная: вы сами переносите идеи, обновляете контекст, проверяете связки, сохраняете файлы и доводите материалы до публикации.</p>
          <div class="callout">
            <strong>Что полноценный Карманный СММщик уже может делать за вас</strong>
            <ul>
              <li>утренний и вечерний опрос по идеям и наблюдениям;</li>
              <li>составление плана на неделю;</li>
              <li>создание текстов для постов, каруселей, сценариев, подписей под видео и блоков сторис;</li>
              <li>создание визуала для постов, каруселей и обложек видео в вашем стиле;</li>
              <li>публикация постов и каруселей;</li>
              <li>напоминание о публикации сторис и видео.</li>
            </ul>
          </div>

          <div class="cta-box">
            <h3>Хотите собрать ИИ-опору глубже под ваш блог?</h3>
            <p>Приходите на индивидуальный разбор. Посмотрим ваш блог, продукты, ручные точки хаоса и поймём, что вам нужнее: настройка ChatGPT, мини-система или полноценный Карманный СММщик.</p>
            <div class="hero-actions">
              <a class="primary-link" href="https://wa.me/77054897959?text=%D0%A5%D0%BE%D1%87%D1%83%20%D0%B7%D0%B0%D0%BF%D0%B8%D1%81%D0%B0%D1%82%D1%8C%D1%81%D1%8F%20%D0%BD%D0%B0%20%D0%B8%D0%BD%D0%B4%D0%B8%D0%B2%D0%B8%D0%B4%D1%83%D0%B0%D0%BB%D1%8C%D0%BD%D1%8B%D0%B9%20%D1%80%D0%B0%D0%B7%D0%B1%D0%BE%D1%80%20%D0%98%D0%98-%D0%BE%D0%BF%D0%BE%D1%80%D1%8B" target="_blank" rel="noopener">Записаться на разбор</a>
            </div>
          </div>'''
          new_final = '''          <h3>Что можно настроить глубже</h3>
          <p>Эта мини-система помогает понять механику и уже навести порядок. Но она всё ещё базовая: вы сами переносите идеи, обновляете контекст, проверяете связки, сохраняете файлы и доводите материалы до публикации.</p>
          <div class="callout">
            <strong>Персональный ИИ СММщик внутри ChatGPT или Claude помогает</strong>
            <ul>
              <li>держать основу блога, продукт, аудиторию и стиль в одном контексте;</li>
              <li>сохранять и развивать идеи без постоянного старта с нуля;</li>
              <li>составлять контент-план под один блог и один основной продукт;</li>
              <li>создавать посты, Reels, сторис и карусели в вашем голосе;</li>
              <li>адаптировать одну мысль под разные форматы;</li>
              <li>проверять материалы на соответствие стилю, цели блога и пути клиента.</li>
            </ul>
          </div>

          <div class="cta-box">
            <h3>Хотите настроить такую систему под свой блог глубже?</h3>
            <p>Если хотите, чтобы ИИ понимал ваш продукт, аудиторию, стиль, темы, визуал и путь клиента к покупке, можно настроить персонального ИИ СММщика под ваш блог. Чтобы узнать подробнее про новый продукт, напишите Айсулу. Если остались вопросы по использованию практикума, напишите мне.</p>
            <div class="hero-actions">
              <a class="primary-link" href="https://wa.me/77073343785?text=%D0%A5%D0%BE%D1%87%D1%83%20%D0%BF%D0%BE%D0%B4%D1%80%D0%BE%D0%B1%D0%BD%D0%B5%D0%B5%20%D0%BF%D1%80%D0%BE%20%D0%BD%D0%B0%D1%81%D1%82%D1%80%D0%BE%D0%B9%D0%BA%D1%83%20%D0%98%D0%98%20%D0%A1%D0%9C%D0%9C%D1%89%D0%B8%D0%BA%D0%B0" target="_blank" rel="noopener">Подробнее про настройку ИИ СММщика</a>
              <a class="ghost-link" href="https://wa.me/77054897959?text=%D0%A3%20%D0%BC%D0%B5%D0%BD%D1%8F%20%D0%B2%D0%BE%D0%BF%D1%80%D0%BE%D1%81%20%D0%BF%D0%BE%20%D0%B8%D1%81%D0%BF%D0%BE%D0%BB%D1%8C%D0%B7%D0%BE%D0%B2%D0%B0%D0%BD%D0%B8%D1%8E%20%D0%BF%D1%80%D0%B0%D0%BA%D1%82%D0%B8%D0%BA%D1%83%D0%BC%D0%B0" target="_blank" rel="noopener">Задать вопрос по практикуму</a>
            </div>
          </div>'''
          if old_final not in text:
              raise SystemExit('Final block was not found')
          text = text.replace(old_final, new_final)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patch and remove workflow
        run: |
          rm .github/workflows/update-tripwire-offer.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-tripwire-offer.yml
          git commit -m "Update tripwire offer CTA" || exit 0
          git push
